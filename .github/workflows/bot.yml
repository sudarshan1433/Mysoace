name: Stealth Bot Runner

on:
  schedule:
    # Ye bot har 2 ghante mein ek baar chalega
    - cron: '0 */2 * * *' 
  workflow_dispatch: # Manual run button ke liye

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Chromium & Modern Dependencies
        # Yahan se purana libgconf-2-4 hata diya hai aur libgbm1 add kiya hai
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libnss3 libfontconfig1 libgbm1

      - name: Build and Run Bot
        run: cargo run --release

