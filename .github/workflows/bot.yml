name: Run Bot

on:
  workflow_dispatch: # Sirf manual run ke liye

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Chromium & Dependencies
        # Yahan se faaltu packages hata diye hain, ab error nahi aayega
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libnss3 libfontconfig1 libgbm1

      - name: Build and Run Bot
        run: cargo run --release
