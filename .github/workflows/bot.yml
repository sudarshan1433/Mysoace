name: Stealth Bot Runner

on:
  schedule:
    - cron: '0 */2 * * *' 
  workflow_dispatch: 

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Chromium & Modern Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser libnss3 libfontconfig1 libgbm1

      - name: Build and Run Bot
        run: cargo run --release
